services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: invoice_ai_monitor_app
    working_dir: /var/www
    volumes:
      - .:/var/www
      - vendor_cache:/var/www/vendor
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - invoice_net
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: invoice_ai_monitor_nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - invoice_net
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: invoice_ai_monitor_db
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-invoice_monitor}
      MYSQL_USER: ${DB_USERNAME:-invoice_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    ports:
      - "${DB_PORT_EXTERNAL:-33060}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - invoice_net
    restart: unless-stopped

volumes:
  db_data:
  vendor_cache:

networks:
  invoice_net:
    driver: bridge
